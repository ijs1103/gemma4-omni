<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인 처리 중...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0ff;
    }
    .container {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>로그인 처리 중입니다...</p>
  </div>

  <script>
    /**
     * OAuth 콜백 페이지 (팝업 용)
     *
     * OAuth 제공자(Google, Kakao 등)가 인증 완료 후 이 페이지로 리다이렉트합니다.
     * URL의 query parameter에서 code와 state를 추출하여
     * 부모 창(window.opener)에 postMessage로 전달합니다.
     *
     * 플로우:
     * 1. OAuth 제공자 → /auth/callback?code=xxx&state=yyy 로 리다이렉트
     * 2. 이 페이지가 code, state를 파싱
     * 3. window.opener.postMessage({ type: 'OAUTH_CALLBACK', code, state })
     * 4. 부모 창의 WebAuthAdapter.waitForOAuthCallback이 수신
     * 5. 이 팝업 자동 닫힘
     */

    (function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      if (window.opener) {
        if (error) {
          window.opener.postMessage({
            type: 'OAUTH_CALLBACK',
            error: error,
          }, window.location.origin);
        } else if (code) {
          window.opener.postMessage({
            type: 'OAUTH_CALLBACK',
            code: code,
            state: state,
          }, window.location.origin);
        } else {
          window.opener.postMessage({
            type: 'OAUTH_CALLBACK',
            error: 'no_code',
          }, window.location.origin);
        }

        // 팝업 닫기 (약간 딜레이를 두어 postMessage 전달 보장)
        setTimeout(() => window.close(), 300);
      } else {
        // 팝업이 아닌 일반 탭으로 열린 경우 (Redirect 모드 fallback)
        // 메인 페이지로 code를 포함하여 리다이렉트
        const redirectUrl = new URL('/', window.location.origin);
        if (code) redirectUrl.searchParams.set('auth_code', code);
        if (state) redirectUrl.searchParams.set('auth_state', state);
        if (error) redirectUrl.searchParams.set('auth_error', error);
        window.location.href = redirectUrl.toString();
      }
    })();
  </script>
</body>
</html>
